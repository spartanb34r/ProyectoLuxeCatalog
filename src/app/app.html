@if (mostrarHeader) {

<header class="app-header">

  <div class="logo">
    LUXE CATALOG
  </div>

  <nav>

    <a
      routerLink="/catalogo"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{exact: true}"
    >
      Catálogo
    </a>

    <a
      routerLink="/carrito"
      routerLinkActive="active"
    >
      Carrito
      <span class="badge">
        {{ cantidadCarrito }}
      </span>
    </a>

  </nav>

  <div class="user-section">

    <button
      class="user-btn"
      (click)="togglePerfilMenu(); $event.stopPropagation()"
    >
      👤 {{ usuario?.usuario }}
    </button>

    @if (mostrarPerfilMenu) {

      <div class="perfil-menu">

        <button (click)="irPerfil()">
          Ver perfil
        </button>

        <button (click)="logout()">
          Cerrar sesión
        </button>

      </div>

    }

  </div>

</header>

}

<router-outlet></router-outlet>
