<article class="card">
  <img class="img" [src]="product.imageUrl" [alt]="product.name" />

  <div class="body">
    <div class="top">
      <h3 class="title">{{ product.name }}</h3>
      <span class="price">$ {{ product.price }}</span>
    </div>

    <p class="meta">{{ product.category }}</p>
    <p class="desc">{{ product.description }}</p>

    <p class="stock" [class.out]="!product.stock">
      @if (product.stock > 0) { Stock disponible: {{product.stock}} } @else { Agotado }
    </p>

    <button class="btn" [disabled]="product.stock<=0" (click)="onAdd()">
      Agregar al carrito
    </button>

    @if (showSuccess) {
      <div class="success-message">✓ Producto agregado al carrito</div>
    }
  </div>
</article>
